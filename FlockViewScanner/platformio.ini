[env:esp32dev]
platform = espressif32@^6.9.0
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 115200

lib_deps =
    h2zero/NimBLE-Arduino@^1.4.3
    bblanchon/ArduinoJson@^7.4.3

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -Wall
    -Wextra

monitor_filters =
    esp32_exception_decoder