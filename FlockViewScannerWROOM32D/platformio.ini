[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32@^6.9.0
board = esp32dev
framework = espidf
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -Wall
    -Wextra

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags =
    -DUNIT_TEST
    -Wall
    -Wextra
build_src_filter =
    +<FlockClassifier.cpp>
    +<DetectionCache.cpp>
    +<RssiTracker.cpp>
    +<ScannerTypes.cpp>
